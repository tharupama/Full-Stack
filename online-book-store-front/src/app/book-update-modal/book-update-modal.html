<h2 mat-dialog-title>Update Book</h2>
<form [formGroup]="updateForm" (ngSubmit)="onSubmit()">
  <mat-dialog-content class="mat-typography">
    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Title</mat-label>
      <input matInput formControlName="title" required />
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Image URL</mat-label>
      <input matInput formControlName="imgUrl" />
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Category</mat-label>
      <mat-select formControlName="category">
        <mat-option value="science-fiction">Science Fiction</mat-option>
        <mat-option value="mystery">Mystery</mat-option>
        <mat-option value="biography">Biography</mat-option>
        <mat-option value="science">Science</mat-option>
        <mat-option value="history">History</mat-option>
        <mat-option value="romance">Romance</mat-option>
      </mat-select>
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Author</mat-label>
      <input matInput formControlName="author" required />
    </mat-form-field>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

    <div class="flex gap-4">
      <mat-form-field appearance="fill" class="w-1/2">
        <mat-label>Price</mat-label>
        <input matInput type="number" step="0.01" formControlName="price" required />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-1/2">
        <mat-label>Stock</mat-label>
        <input matInput type="number" formControlName="stock" required />
      </mat-form-field>
    </div>

    <mat-form-field appearance="fill" class="w-full">
      <mat-label>Availability</mat-label>
      <mat-select formControlName="isAvailable">
        <mat-option [value]="true">Available</mat-option>
        <mat-option [value]="false">Unavailable</mat-option>
      </mat-select>
    </mat-form-field>
  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button mat-button type="button" (click)="onCancel()">Cancel</button>
    <button mat-raised-button color="primary" type="submit" [disabled]="updateForm.invalid">
      Update
    </button>
  </mat-dialog-actions>
</form>
