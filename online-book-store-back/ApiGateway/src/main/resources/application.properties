spring.application.name=ApiGateway
server.port=9191
eureka.instance.client.serverUrl.defaultZone=http://localhost:8761/eureka 
spring.cloud.gateway.server.webmvc.routes[0].id=AuthService
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://AuthService
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/**
# Enable tracing and sample 100% of requests
management.tracing.export.enabled=true
management.tracing.sampling.probability=1.0

# Tell Spring Boot where your Zipkin server is running
management.tracing.export.zipkin.endpoint=http://localhost:9492/api/v2/spans

